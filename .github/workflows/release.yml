name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${GITHUB_REF_NAME#v}"
          cli_version="$(sed -nE 's/^const cliVersion = "([^"]+)"/\1/p' apps/carina-cli/main.go)"
          test -n "$cli_version"
          test "$version" = "$cli_version"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Validate Homebrew formula template
        run: ./scripts/test-homebrew-formula.sh

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goarch: arm64
          - runner: macos-15-intel
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build release archive
        env:
          SKIP_HEADROOM: "1"
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ./scripts/package-release.sh
          test -f "dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz"
          test -f "dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz.sha256"

      - name: Smoke test Homebrew install
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" \
          GOARCH="${{ matrix.goarch }}" \
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz" \
            ./scripts/test-homebrew-install.sh

      - name: Attest release archive
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/carina_*.tar.gz

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: carina-darwin-${{ matrix.goarch }}
          path: |
            dist/carina_*.tar.gz
            dist/carina_*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: carina-darwin-*
          path: dist
          merge-multiple: true

      - name: Verify release assets
        run: |
          test "$(find dist -maxdepth 1 -name '*.tar.gz' | wc -l | tr -d ' ')" = "2"
          test "$(find dist -maxdepth 1 -name '*.tar.gz.sha256' | wc -l | tr -d ' ')" = "2"
          (cd dist && sha256sum -c ./*.tar.gz.sha256)
          cat dist/*.tar.gz.sha256 | sort -k2 > dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.tar.gz.sha256 dist/SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.tar.gz.sha256 dist/SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes \
              --title "Carina ${GITHUB_REF_NAME#v}"
          fi

  update-homebrew-tap:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require tap deploy key
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: test -n "$HOMEBREW_TAP_DEPLOY_KEY"

      - name: Check out Carina
        uses: actions/checkout@v7
        with:
          path: carina

      - name: Check out Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: Nebutra/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - uses: actions/download-artifact@v8
        with:
          pattern: carina-darwin-*
          path: dist
          merge-multiple: true

      - name: Render Formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          arm64_sha="$(awk '{print $1}' "dist/carina_${version}_darwin_arm64.tar.gz.sha256")"
          amd64_sha="$(awk '{print $1}' "dist/carina_${version}_darwin_amd64.tar.gz.sha256")"
          VERSION="$version" \
          DARWIN_ARM64_SHA256="$arm64_sha" \
          DARWIN_AMD64_SHA256="$amd64_sha" \
          OUTPUT="$GITHUB_WORKSPACE/homebrew-tap/Formula/carina.rb" \
            "$GITHUB_WORKSPACE/carina/scripts/render-homebrew-formula.sh"

      - name: Commit Formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/carina.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "carina ${GITHUB_REF_NAME#v}"
          git push origin HEAD:main
