name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go for product version validation
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Validate release tag
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${GITHUB_REF_NAME#v}"
          product_version="$(go run ./scripts/product-version.go)"
          test -n "$product_version"
          test "$version" = "$product_version"
          git fetch origin main
          test "$GITHUB_SHA" = "$(git rev-parse origin/main)"

      - name: Validate release version matrix
        run: ./scripts/test-version-matrix.sh

      - name: Build release test dependencies
        run: |
          make all
          cargo build --release -p carina-kernel --bin carina-kernel-service

      - name: Run Go and Rust release gates
        env:
          CARINA_KERNEL_BIN: ${{ github.workspace }}/target/release/carina-kernel-service
        run: |
          go test ./go/... ./apps/...
          go vet ./...
          cargo test --workspace

      - name: Run SDK conformance gates
        run: |
          go test -race ./sdk/go
          (cd sdk/typescript && npm ci && npm test)
          PYTHONPATH=sdk/python/src python3 -m unittest discover -s sdk/python/tests
          node packaging/npm/test.mjs

      - name: Validate Homebrew formula template
        run: ./scripts/test-homebrew-formula.sh

      - name: Validate signing automation
        run: ./scripts/test-sign-and-notarize-release.sh

  release-secrets:
    needs: validate
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require Apple release credentials
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          test -n "$APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64"
          test -n "$APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD"
          test -n "$APPLE_DEVELOPER_ID_APPLICATION_IDENTITY"
          test -n "$APPLE_NOTARY_APPLE_ID"
          test -n "$APPLE_NOTARY_TEAM_ID"
          test -n "$APPLE_NOTARY_PASSWORD"
          [[ "$APPLE_DEVELOPER_ID_APPLICATION_IDENTITY" == "Developer ID Application:"* ]]
          [[ "$APPLE_NOTARY_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]

  build:
    needs:
      - validate
      - release-secrets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goarch: arm64
          - runner: macos-15-intel
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Set up Node for packaged SDK conformance
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build release archive
        env:
          SKIP_HEADROOM: "1"
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ./scripts/package-release.sh
          test -f "dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz"
          test -f "dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz.sha256"

      - name: Sign and notarize release archive
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz" \
            ./scripts/sign-and-notarize-release.sh

      - name: Test packaged daemon SDK conformance
        run: |
          version="${GITHUB_REF_NAME#v}"
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz" \
            ./scripts/test-packaged-conformance.sh

      - name: Preserve signing diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: carina-signing-diagnostics-${{ matrix.goarch }}
          path: |
            dist/carina_*.tar.gz.notary.json
            dist/carina_*.tar.gz.signing.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Smoke test Homebrew install
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" \
          GOARCH="${{ matrix.goarch }}" \
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz" \
            ./scripts/test-homebrew-install.sh

      - name: Attest release archive
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/carina_*.tar.gz

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: carina-darwin-${{ matrix.goarch }}
          path: |
            dist/carina_*.tar.gz
            dist/carina_*.tar.gz.sha256
            dist/carina_*.tar.gz.notary.json
            dist/carina_*.tar.gz.signing.txt
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [build, build-linux, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: carina-darwin-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: carina-linux-*
          path: dist
          merge-multiple: true

      - name: Verify release assets
        run: |
          version="${GITHUB_REF_NAME#v}"
          for target in darwin_arm64 darwin_amd64 linux_arm64 linux_amd64; do
            test -f "dist/carina_${version}_${target}.tar.gz"
            test -f "dist/carina_${version}_${target}.tar.gz.sha256"
          done
          for arch in arm64 amd64; do
            test -f "dist/carina_${version}_darwin_${arch}.tar.gz.notary.json"
            test -f "dist/carina_${version}_darwin_${arch}.tar.gz.signing.txt"
          done
          (cd dist && sha256sum -c ./*.tar.gz.sha256)
          cat dist/*.tar.gz.sha256 | sort -k2 > dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.tar.gz.sha256 \
              dist/*.tar.gz.notary.json dist/*.tar.gz.signing.txt dist/SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.tar.gz.sha256 \
              dist/*.tar.gz.notary.json dist/*.tar.gz.signing.txt dist/SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes \
              --title "Carina ${GITHUB_REF_NAME#v}"
          fi

  build-linux:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "1.25" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: mlugg/setup-zig@v2
        with: { version: 0.15.1 }
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: Build Linux release archive
        env:
          SKIP_HEADROOM: "1"
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ./scripts/package-release.sh
      - name: Test packaged daemon SDK conformance
        run: |
          version="${GITHUB_REF_NAME#v}"
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_linux_${{ matrix.goarch }}.tar.gz" ./scripts/test-packaged-conformance.sh
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/carina_*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: carina-linux-${{ matrix.goarch }}
          path: |
            dist/carina_*.tar.gz
            dist/carina_*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v8
        with:
          pattern: carina-*
          path: dist
          merge-multiple: true
      - uses: anchore/sbom-action/download-syft@v0
      - name: Assemble and pack native npm packages
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ./scripts/package-npm-release.sh
      - name: Publish platform packages before launcher with trusted publishing
        run: |
          version="${GITHUB_REF_NAME#v}"
          publish_or_verify() {
            package="$1"
            name="$(node -p "require('./${package}/package.json').name")"
            tarball="$(find "$package" -maxdepth 1 -name '*.tgz' -print -quit)"
            test -n "$tarball"
            integrity="sha512-$(openssl dgst -sha512 -binary "$tarball" | base64 -w0)"
            remote="$(npm view "${name}@${version}" dist.integrity 2>/dev/null || true)"
            if [[ -n "$remote" ]]; then
              [[ "$remote" == "$integrity" ]] || { echo "existing ${name}@${version} digest mismatch" >&2; exit 1; }
              echo "verified existing ${name}@${version}"
              return
            fi
            npm publish "$tarball" --access public --provenance
          }
          for package in dist/npm/@nebutra+carina-*; do publish_or_verify "$package"; done
          publish_or_verify dist/npm/@nebutra+carina

  update-homebrew-tap:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require tap deploy key
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: test -n "$HOMEBREW_TAP_DEPLOY_KEY"

      - name: Check out Carina
        uses: actions/checkout@v7
        with:
          path: carina

      - name: Check out Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: Nebutra/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - uses: actions/download-artifact@v8
        with:
          pattern: carina-darwin-*
          path: dist
          merge-multiple: true

      - name: Render Formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          arm64_sha="$(awk '{print $1}' "dist/carina_${version}_darwin_arm64.tar.gz.sha256")"
          amd64_sha="$(awk '{print $1}' "dist/carina_${version}_darwin_amd64.tar.gz.sha256")"
          VERSION="$version" \
          DARWIN_ARM64_SHA256="$arm64_sha" \
          DARWIN_AMD64_SHA256="$amd64_sha" \
          OUTPUT="$GITHUB_WORKSPACE/homebrew-tap/Formula/carina.rb" \
            "$GITHUB_WORKSPACE/carina/scripts/render-homebrew-formula.sh"

      - name: Commit Formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/carina.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "carina ${GITHUB_REF_NAME#v}"
          git push origin HEAD:main
