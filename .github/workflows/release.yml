name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go for product version validation
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.96.1"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.1

      - name: Validate release tag
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${GITHUB_REF_NAME#v}"
          product_version="$(go run ./scripts/product-version.go)"
          test -n "$product_version"
          test "$version" = "$product_version"
          git fetch origin main
          test "$GITHUB_SHA" = "$(git rev-parse origin/main)"

      - name: Validate release version matrix
        run: ./scripts/test-version-matrix.sh

      - name: Require npm OIDC bootstrap before release work
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TRUSTED_PUBLISHERS_CONFIRMED: ${{ vars.NPM_TRUSTED_PUBLISHERS_CONFIRMED }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/environments/npm-release" >/dev/null
          for package in \
            @nebutra/carina \
            @nebutra/carina-darwin-arm64 \
            @nebutra/carina-darwin-x64 \
            @nebutra/carina-linux-arm64 \
            @nebutra/carina-linux-x64; do
            npm view "$package" name >/dev/null
          done
          test "$NPM_TRUSTED_PUBLISHERS_CONFIRMED" = "true"

      - name: Install pinned actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run local-equivalent release gate
        run: PATH="$(go env GOPATH)/bin:$PATH" make release-check

      - name: Prove preflight fail-closed reporting
        run: PATH="$(go env GOPATH)/bin:$PATH" make release-preflight-test

  release-secrets:
    needs: validate
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require Homebrew release credential
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          test -n "$HOMEBREW_TAP_DEPLOY_KEY"

  build:
    needs:
      - validate
      - release-secrets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goarch: arm64
          - runner: macos-15-intel
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    environment: codesigning
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Require protected Apple release credentials
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          test -n "$APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64"
          test -n "$APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD"
          test -n "$APPLE_DEVELOPER_ID_APPLICATION_IDENTITY"
          test -n "$APPLE_NOTARY_APPLE_ID"
          test -n "$APPLE_NOTARY_TEAM_ID"
          test -n "$APPLE_NOTARY_PASSWORD"
          [[ "$APPLE_DEVELOPER_ID_APPLICATION_IDENTITY" == "Developer ID Application:"* ]]
          [[ "$APPLE_NOTARY_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.96.1"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.1

      - name: Set up Node for packaged SDK conformance
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Build release archive
        env:
          SKIP_HEADROOM: "1"
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ./scripts/package-release.sh
          test -f "dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz"
          test -f "dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz.sha256"

      - name: Sign and notarize release archive
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz" \
            ./scripts/sign-and-notarize-release.sh

      - name: Test packaged daemon SDK conformance
        run: |
          version="${GITHUB_REF_NAME#v}"
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz" \
            ./scripts/test-packaged-conformance.sh

      - name: Preserve signing diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: carina-signing-diagnostics-${{ matrix.goarch }}
          path: |
            dist/carina_*.tar.gz.notary.json
            dist/carina_*.tar.gz.signing.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Smoke test Homebrew install
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" \
          GOARCH="${{ matrix.goarch }}" \
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_darwin_${{ matrix.goarch }}.tar.gz" \
            ./scripts/test-homebrew-install.sh

      - name: Attest release archive
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: dist/carina_*.tar.gz

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: carina-darwin-${{ matrix.goarch }}
          path: |
            dist/carina_*.tar.gz
            dist/carina_*.tar.gz.sha256
            dist/carina_*.tar.gz.notary.json
            dist/carina_*.tar.gz.signing.txt
          if-no-files-found: error
          retention-days: 7

  build-integrations:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with: { go-version: "1.25" }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: "24" }
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with: { python-version: "3.12" }
      - name: Build operator client packages
        run: VERSION="${GITHUB_REF_NAME#v}" ./scripts/package-integrations.sh
      - uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: |
            dist/carina_*_vscode.vsix
            dist/carina_*_web-operator.tar.gz
            dist/carina-install.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: carina-integrations
          path: |
            dist/carina_*_vscode.vsix
            dist/carina_*_vscode.vsix.sha256
            dist/carina_*_web-operator.tar.gz
            dist/carina_*_web-operator.tar.gz.sha256
            dist/carina-install.sh
            dist/carina-install.sh.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [build, build-linux, build-windows-worker, build-integrations, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: carina-darwin-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: carina-linux-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: carina-windows-worker-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: carina-integrations
          path: dist

      - name: Verify release assets
        run: VERSION="${GITHUB_REF_NAME#v}" REQUIRE_SIGNING=1 ./scripts/verify-release-assets.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null
          version="${GITHUB_REF_NAME#v}"
          if [[ "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" != "true" ]]; then
            mkdir -p published/native published/npm
            gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets \
              --jq '.assets[].name' | LC_ALL=C sort > published/assets.actual
            {
              echo SHA256SUMS
              echo "carina_${version}_npm_packages.tar.gz"
              echo "carina_${version}_vscode.vsix"
              echo "carina_${version}_vscode.vsix.sha256"
              echo "carina_${version}_web-operator.tar.gz"
              echo "carina_${version}_web-operator.tar.gz.sha256"
              echo "carina-install.sh"
              echo "carina-install.sh.sha256"
              for target in darwin_arm64 darwin_amd64 linux_arm64 linux_amd64; do
                echo "carina_${version}_${target}.tar.gz"
                echo "carina_${version}_${target}.tar.gz.sha256"
              done
              for arch in arm64 amd64; do
                for ext in deb rpm; do
                  echo "carina_${version}_linux_${arch}.${ext}"
                  echo "carina_${version}_linux_${arch}.${ext}.sha256"
                done
                echo "carina-worker_${version}_windows_${arch}.zip"
                echo "carina-worker_${version}_windows_${arch}.zip.sha256"
              done
              for arch in arm64 amd64; do
                echo "carina_${version}_darwin_${arch}.tar.gz.notary.json"
                echo "carina_${version}_darwin_${arch}.tar.gz.signing.txt"
              done
            } | LC_ALL=C sort > published/assets.expected
            cmp published/assets.expected published/assets.actual
            gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --dir published/native -p "carina_${version}_darwin_*" \
              -p "carina_${version}_linux_*" -p "carina-worker_${version}_windows_*" \
              -p "carina_${version}_vscode.vsix*" -p "carina_${version}_web-operator.tar.gz*" \
              -p "carina-install.sh*" \
              -p SHA256SUMS
            gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --dir published/npm -p "carina_${version}_npm_packages.tar.gz"
            cp published/native/SHA256SUMS published/SHA256SUMS.expected
            DIST=published/native VERSION="$version" REQUIRE_SIGNING=1 ./scripts/verify-release-assets.sh
            DIST=published/native VERSION="$version" ./scripts/verify-linux-packages.sh
            DIST=published/native VERSION="$version" ./scripts/verify-windows-worker-packages.sh
            DIST=published/native VERSION="$version" ./scripts/verify-integration-packages.sh
            cmp published/SHA256SUMS.expected published/native/SHA256SUMS
            VERSION="$version" BUNDLE="published/npm/carina_${version}_npm_packages.tar.gz" \
              ./scripts/verify-npm-release-bundle.sh
            echo "published release is immutable and already verified"
            exit 0
          fi
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.tar.gz.sha256 \
            dist/*.tar.gz.notary.json dist/*.tar.gz.signing.txt dist/*.deb dist/*.deb.sha256 \
            dist/*.rpm dist/*.rpm.sha256 dist/*.zip dist/*.zip.sha256 dist/SHA256SUMS \
            dist/*.vsix dist/*.vsix.sha256 \
            dist/carina-install.sh dist/carina-install.sh.sha256 \
            --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --draft=false --latest

  build-linux:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with: { go-version: "1.25" }
      - name: Install pinned nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.96.1"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with: { python-version: "3.12" }
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with: { version: 0.15.1 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: "24" }
      - name: Build Linux release archive
        env:
          SKIP_HEADROOM: "1"
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ./scripts/package-release.sh
          VERSION="$version" GOARCH="${{ matrix.goarch }}" \
            ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_linux_${{ matrix.goarch }}.tar.gz" \
            ./scripts/package-linux.sh
      - name: Test packaged daemon SDK conformance
        run: |
          version="${GITHUB_REF_NAME#v}"
          ARCHIVE="$GITHUB_WORKSPACE/dist/carina_${version}_linux_${{ matrix.goarch }}.tar.gz" ./scripts/test-packaged-conformance.sh
      - uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: dist/carina_*.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: carina-linux-${{ matrix.goarch }}
          path: |
            dist/carina_*.tar.gz
            dist/carina_*.tar.gz.sha256
            dist/carina_*.deb
            dist/carina_*.deb.sha256
            dist/carina_*.rpm
            dist/carina_*.rpm.sha256
          if-no-files-found: error
          retention-days: 7

  build-windows-worker:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with: { go-version: "1.25" }
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with: { python-version: "3.12" }
      - name: Build deterministic Windows worker package
        run: |
          VERSION="${GITHUB_REF_NAME#v}" GOARCH="${{ matrix.goarch }}" ./scripts/package-windows-worker.sh
      - uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: dist/carina-worker_*.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: carina-windows-worker-${{ matrix.goarch }}
          path: |
            dist/carina-worker_*.zip
            dist/carina-worker_*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  freeze-npm:
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with: { go-version: "1.25" }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: "24" }
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: carina-*
          path: dist
          merge-multiple: true
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.46.0
      - name: Create or reuse immutable npm package bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          bundle="carina_${version}_npm_packages.tar.gz"
          mkdir -p dist/frozen
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --pattern "$bundle" --dir dist/frozen; then
              VERSION="$version" BUNDLE="dist/frozen/$bundle" ./scripts/verify-npm-release-bundle.sh
              exit 0
            fi
            test "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = "true"
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft --verify-tag --generate-notes --title "Carina $version"
          fi
          VERSION="$version" ./scripts/package-npm-release.sh
          VERSION="$version" ./scripts/package-npm-bundle.sh
          VERSION="$version" ./scripts/verify-npm-release-bundle.sh
          gh release upload "$GITHUB_REF_NAME" "dist/$bundle" \
            --repo "$GITHUB_REPOSITORY"

  publish-npm:
    needs: freeze-npm
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - name: Download and verify immutable npm package bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          bundle="carina_${version}_npm_packages.tar.gz"
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern "$bundle" --dir dist
          VERSION="$version" BUNDLE="dist/$bundle" OUTPUT_DIR=dist/npm-frozen \
            ./scripts/verify-npm-release-bundle.sh
      - name: Publish platform packages before launcher with trusted publishing
        run: |
          version="${GITHUB_REF_NAME#v}"
          publish_or_verify() {
            tarball="$1"
            name="$(tar -xOf "$tarball" package/package.json | node -e 'const fs=require("fs"); console.log(JSON.parse(fs.readFileSync(0,"utf8")).name)')"
            integrity="sha512-$(openssl dgst -sha512 -binary "$tarball" | base64 -w0)"
            remote="$(npm view "${name}@${version}" dist.integrity 2>/dev/null || true)"
            if [[ -n "$remote" ]]; then
              [[ "$remote" == "$integrity" ]] || { echo "existing ${name}@${version} digest mismatch" >&2; exit 1; }
              echo "verified existing ${name}@${version}"
              return
            fi
            npm publish "$tarball" --access public --provenance
          }
          for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            publish_or_verify "dist/npm-frozen/nebutra-carina-${platform}-${version}.tgz"
          done
          publish_or_verify "dist/npm-frozen/nebutra-carina-${version}.tgz"

  update-homebrew-tap:
    needs: publish
    runs-on: ubuntu-latest
    concurrency:
      group: carina-homebrew-tap-main
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Require tap deploy key
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: test -n "$HOMEBREW_TAP_DEPLOY_KEY"

      - name: Check out Carina
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: carina
          persist-credentials: false

      - name: Check out Homebrew tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Nebutra/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap
          persist-credentials: false

      - name: Configure Homebrew tap SSH
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          key="$RUNNER_TEMP/homebrew-tap-deploy-key"
          known_hosts="$RUNNER_TEMP/github-known-hosts"
          umask 077
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > "$key"
          gh api meta --jq '.ssh_keys[] | "github.com \(.)"' > "$known_hosts"
          test -s "$known_hosts"
          echo "GIT_SSH_COMMAND=ssh -i $key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$known_hosts" >> "$GITHUB_ENV"

      - name: Refresh tap and reject version downgrade
        working-directory: homebrew-tap
        run: |
          git fetch origin main
          git merge --ff-only origin/main
          current="$(sed -n 's/^  version "\([^"]*\)"/\1/p' Formula/carina.rb 2>/dev/null || true)"
          "$GITHUB_WORKSPACE/carina/scripts/check-homebrew-version.sh" "$current" "${GITHUB_REF_NAME#v}"

      - name: Download immutable published platform checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --dir dist -p "carina_${version}_darwin_*.tar.gz.sha256" \
            -p "carina_${version}_linux_*.tar.gz.sha256"

      - name: Render Formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          arm64_sha="$(awk '{print $1}' "dist/carina_${version}_darwin_arm64.tar.gz.sha256")"
          amd64_sha="$(awk '{print $1}' "dist/carina_${version}_darwin_amd64.tar.gz.sha256")"
          linux_arm64_sha="$(awk '{print $1}' "dist/carina_${version}_linux_arm64.tar.gz.sha256")"
          linux_amd64_sha="$(awk '{print $1}' "dist/carina_${version}_linux_amd64.tar.gz.sha256")"
          VERSION="$version" \
          DARWIN_ARM64_SHA256="$arm64_sha" \
          DARWIN_AMD64_SHA256="$amd64_sha" \
          LINUX_ARM64_SHA256="$linux_arm64_sha" \
          LINUX_AMD64_SHA256="$linux_amd64_sha" \
          OUTPUT="$GITHUB_WORKSPACE/homebrew-tap/Formula/carina.rb" \
            "$GITHUB_WORKSPACE/carina/scripts/render-homebrew-formula.sh"

      - name: Commit Formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/carina.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "carina ${GITHUB_REF_NAME#v}"
          git push origin HEAD:main
