<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Carina Operator</title><link rel="stylesheet" href="app.css"></head><body>
<header><strong>Carina Operator</strong><span id="connection" class="offline">Disconnected</span><button id="settings" title="Gateway connection settings">Settings</button><button id="refresh">Refresh</button></header>
<main><nav role="tablist" aria-label="Operator views"><button class="tab" role="tab" aria-selected="false" tabindex="-1" data-tab="inbox">Inbox</button><button class="tab active" role="tab" aria-selected="true" tabindex="0" data-tab="agents">Runs</button><button class="tab" role="tab" aria-selected="false" tabindex="-1" data-tab="workflows">Graph</button><button class="tab" role="tab" aria-selected="false" tabindex="-1" data-tab="cost">Cost</button><button class="tab" role="tab" aria-selected="false" tabindex="-1" data-tab="system">System</button><label><input id="writes" type="checkbox"> Operator mode</label><p id="modeHelp" class="muted">Read-only observer</p></nav><section id="content" role="tabpanel" aria-live="polite"></section></main>
<dialog id="connect"><form method="dialog"><h2>Gateway</h2><label>WebSocket URL<input id="url" value="ws://127.0.0.1:8765/gateway"></label><label>Observer token<input id="observerToken" type="password" autocomplete="off"></label><label>Operator token<input id="operatorToken" type="password" autocomplete="off"></label><p>Tokens remain in this tab's memory and are never persisted. Mode changes reconnect with the matching role and scopes.</p><menu><button value="cancel">Cancel</button><button id="connectNow" value="default">Connect</button></menu></form></dialog>
<dialog id="confirm"><form method="dialog"><h2>Confirm runtime write</h2><pre id="operation"></pre><p>The daemon policy and token scopes remain authoritative.</p><menu><button value="cancel">Cancel</button><button id="confirmNow" value="default">Confirm</button></menu></form></dialog>
<dialog id="artifact"><form method="dialog"><h2 id="artifactTitle">Artifact</h2><p id="artifactMeta" class="muted"></p><pre id="artifactBody"></pre><menu><button value="cancel">Close</button><button id="artifactDownload" type="button">Download</button></menu></form></dialog>
<script type="module" src="app.js"></script></body></html>
