<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Carina Operator</title><link rel="stylesheet" href="app.css"></head><body>
<header><strong>Carina Operator</strong><span id="connection" class="offline">Disconnected</span><button id="settings" title="Gateway connection settings">Settings</button><button id="refresh">Refresh</button></header>
<main><nav><button class="tab active" data-tab="agents">Agents</button><button class="tab" data-tab="workflows">Workflows</button><button class="tab" data-tab="cost">Cost</button><label><input id="writes" type="checkbox"> Enable write controls</label></nav><section id="content" aria-live="polite"></section></main>
<dialog id="connect"><form method="dialog"><h2>Gateway</h2><label>WebSocket URL<input id="url" value="ws://127.0.0.1:8765/gateway"></label><label>Scoped token<input id="token" type="password" autocomplete="off"></label><p>Tokens remain in this tab's memory and are never persisted.</p><menu><button value="cancel">Cancel</button><button id="connectNow" value="default">Connect</button></menu></form></dialog>
<dialog id="confirm"><form method="dialog"><h2>Confirm runtime write</h2><pre id="operation"></pre><p>The daemon policy and token scopes remain authoritative.</p><menu><button value="cancel">Cancel</button><button id="confirmNow" value="default">Confirm</button></menu></form></dialog>
<script type="module" src="app.js"></script></body></html>
