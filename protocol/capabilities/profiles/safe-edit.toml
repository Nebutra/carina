name = "safe-edit"
description = "Default MVP profile: edits only through transactional patches, commands from allowlist."

[rules]
file_read = { allow = "workspace" }
file_write = { allow = "patch_only" }
command_exec = { allow = "allowlist", max_risk_level = 1 }
network_access = { allow = "approval" }
secret_read = { allow = "none" }
patch_apply = { allow = "approval" }

[command_allowlist]
patterns = [
  "npm test", "npm run test", "pnpm test", "yarn test", "bun test",
  "cargo test", "cargo check", "go test ./...", "go vet ./...",
  "pytest", "make test", "zig build test",
  "eslint .", "prettier --check .", "tsc --noEmit",
]
