name: carina
arch: ${NFPM_ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Nebutra <opensource@nebutra.com>
description: Local-first governed Agent Runtime
license: MIT
homepage: https://github.com/Nebutra/carina
contents:
  - src: ./dist/stage/bin/carina
    dst: /usr/bin/carina
  - src: ./dist/stage/bin/carina-daemon
    dst: /usr/bin/carina-daemon
  - src: ./dist/stage/bin/carina-worker
    dst: /usr/bin/carina-worker
  - src: ./dist/stage/bin/carina-kernel-service
    dst: /usr/bin/carina-kernel-service
  - src: ./dist/stage/bin/carina-diff
    dst: /usr/bin/carina-diff
  - src: ./dist/stage/bin/carina-grep
    dst: /usr/bin/carina-grep
  - src: ./dist/stage/bin/carina-patch-native
    dst: /usr/bin/carina-patch-native
  - src: ./dist/stage/bin/carina-pty
    dst: /usr/bin/carina-pty
  - src: ./dist/stage/bin/carina-run
    dst: /usr/bin/carina-run
  - src: ./dist/stage/bin/carina-scan
    dst: /usr/bin/carina-scan
  - src: ./dist/stage/bin/headroom
    dst: /usr/bin/headroom
  - src: ./packaging/systemd/carina-worker.service
    dst: /usr/share/doc/carina/examples/carina-worker.service
  - src: ./packaging/systemd/worker.env.example
    dst: /usr/share/doc/carina/examples/worker.env.example
