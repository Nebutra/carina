name: carina
arch: ${NFPM_ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Nebutra <opensource@nebutra.com>
description: Local-first governed Agent Runtime
license: MIT
homepage: https://github.com/Nebutra/carina
contents:
